<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #ffffff;
  --surface: #f8f7f5;
  --surface2:#f0eeeb;
  --border:  #e8e4df;
  --border2: #d0cbc4;
  --text:    #1c1917;
  --muted:   #8c8680;
  --green:   #16a34a;
  --amber:   #d97706;
  --red:     #dc2626;
  --r:       12px;
  --fd:      'DM Serif Display', serif;
  --fb:      'DM Sans', sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--fb);
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ══ SCREENS ══ */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; }

/* ══ LOGIN ══ */
#screen-login {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}
#screen-login::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 47px, var(--border) 47px, var(--border) 48px),
    repeating-linear-gradient(90deg, transparent, transparent 47px, var(--border) 47px, var(--border) 48px);
  opacity: 0.5;
  pointer-events: none;
}
.login-inner {
  width: 100%;
  max-width: 360px;
  position: relative;
  z-index: 1;
  animation: riseIn 0.55s cubic-bezier(0.22,1,0.36,1);
}
@keyframes riseIn {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
.login-logo-img {
  width: 110px;
  height: auto;
  display: block;
  margin: 0 auto 8px;
}
.login-app-name {
  font-family: var(--fd);
  font-size: 42px;
  color: var(--text);
  line-height: 1;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
  text-align: center;
}
.login-tagline {
  font-size: 13px;
  color: var(--muted);
  font-weight: 300;
  margin-bottom: 44px;
  text-align: center;
  letter-spacing: 0.02em;
}
.login-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.login-input {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border2);
  border-radius: var(--r);
  padding: 15px 16px;
  font-family: var(--fb);
  font-size: 17px;
  font-weight: 400;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  margin-bottom: 14px;
  -webkit-appearance: none;
}
.login-input:focus {
  border-color: var(--text);
  box-shadow: 0 0 0 3px rgba(28,25,23,0.06);
}
.login-btn {
  width: 100%;
  padding: 15px;
  background: var(--text);
  color: #fff;
  font-family: var(--fb);
  font-size: 15px;
  font-weight: 600;
  border: none;
  border-radius: var(--r);
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
.login-btn:hover  { opacity: 0.85; }
.login-btn:active { transform: scale(0.985); }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%,60%  { transform: translateX(-7px); }
  40%,80%  { transform: translateX(7px); }
}
.shake { animation: shake 0.35s ease; border-color: var(--red) !important; }

/* ══ APP SHELL ══ */
#screen-app {
  flex-direction: column;
  align-items: stretch;
  justify-content: flex-start;
}
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px 10px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 200;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-logo-img {
  width: 32px;
  height: 32px;
  object-fit: contain;
}
.header-logo-name {
  font-family: var(--fd);
  font-size: 20px;
  color: var(--text);
  letter-spacing: -0.01em;
  line-height: 1;
}
.header-greeting { font-size: 13px; color: var(--muted); }
.header-greeting strong { color: var(--text); font-weight: 500; }
.signout-btn {
  font-size: 12px;
  color: var(--muted);
  background: none;
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 5px 11px;
  cursor: pointer;
  font-family: var(--fb);
  transition: color 0.15s, border-color 0.15s;
}
.signout-btn:hover { color: var(--red); border-color: var(--red); }

/* ══ NAV ══ */
.bottom-nav {
  display: flex;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg);
  border-top: 1px solid var(--border);
  z-index: 200;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 9px 4px 7px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  font-family: var(--fb);
  font-size: 9.5px;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  gap: 4px;
  transition: color 0.15s;
}
.nav-btn svg { width: 19px; height: 19px; }
.nav-btn.active { color: var(--text); }

/* ══ PANELS ══ */
.panels { flex: 1; overflow-y: auto; padding: 16px 15px 88px; }
.panel { display: none; }
.panel.active { display: block; animation: fadeUp 0.2s ease; }
@keyframes fadeUp {
  from { opacity:0; transform: translateY(7px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ══ COMMON ══ */
.slabel {
  font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
}
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 15px; margin-bottom: 10px;
}

/* ══ DASHBOARD ══ */
.metric-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 10px; }
.metric {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 10px; text-align: center;
}
.metric-val { font-family: var(--fd); font-size: 36px; color: var(--text); line-height: 1; }
.metric-lbl {
  font-size: 10px; color: var(--muted); margin-top: 4px;
  font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
}
.week-strip { display: flex; gap: 5px; }
.day-pip {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  padding: 8px 4px; border-radius: 8px; background: var(--surface2);
  border: 1.5px solid transparent; font-size: 9px; font-weight: 600;
  color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em;
}
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); }
.day-pip.done { background: #f0fdf4; border-color: #86efac; color: var(--green); }
.day-pip.done .dot { background: var(--green); }
.today-card {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--text); border-radius: var(--r); padding: 16px; margin-bottom: 10px;
}
.today-lbl {
  font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
  text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 4px;
}
.today-name { font-family: var(--fd); font-size: 19px; color: #fff; }
.go-btn {
  background: #fff; color: var(--text); font-family: var(--fb);
  font-size: 13px; font-weight: 600; border: none; border-radius: 8px;
  padding: 9px 16px; cursor: pointer; white-space: nowrap; transition: opacity 0.15s;
}
.go-btn:hover { opacity: 0.85; }

/* ══ WORKOUT ══ */
.day-btn {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px 14px; margin-bottom: 8px;
  cursor: pointer; text-align: left; font-family: var(--fb);
  transition: border-color 0.15s, background 0.15s;
}
.day-btn:hover { border-color: var(--text); background: var(--surface2); }
.day-btn-name { font-family: var(--fd); font-size: 17px; color: var(--text); margin-bottom: 2px; }
.day-btn-sub  { font-size: 12px; color: var(--muted); }
.day-btn-count{ font-size: 12px; color: var(--muted); }
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 500; color: var(--muted); background: none;
  border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px;
  cursor: pointer; margin-bottom: 14px; font-family: var(--fb); transition: color 0.15s;
}
.back-btn:hover { color: var(--text); }
.ex-day-header {
  font-family: var(--fd); font-size: 26px; color: var(--text);
  margin-bottom: 14px; letter-spacing: -0.01em;
}

/* ══ EXERCISE CARDS ══ */
.ex-card {
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: var(--r); padding: 14px; margin-bottom: 8px;
  transition: border-color 0.2s, background 0.2s;
}
.ex-card.logged { border-color: #86efac; background: #f0fdf4; }
.ex-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
.ex-name { font-weight: 600; font-size: 14px; color: var(--text); line-height: 1.2; margin-bottom: 2px; }
.ex-meta { font-size: 12px; color: var(--muted); }
.ex-done-badge {
  display: none; font-size: 11px; font-weight: 600; color: var(--green);
  background: #dcfce7; border: 1px solid #86efac; border-radius: 20px;
  padding: 3px 10px; white-space: nowrap; flex-shrink: 0;
}
.ex-card.logged .ex-done-badge { display: block; }
.ex-inputs { display: flex; gap: 8px; align-items: center; }
.ex-card.logged .ex-inputs { opacity: 0.35; pointer-events: none; }
.ex-inp-wrap { position: relative; flex: 1; }
.ex-inp-lbl {
  position: absolute; top: 7px; left: 10px;
  font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); pointer-events: none;
}
.ex-inp {
  width: 100%; background: var(--surface); border: 1.5px solid var(--border2);
  border-radius: 8px; padding: 22px 10px 8px; font-family: var(--fd);
  font-size: 24px; color: var(--text); outline: none;
  transition: border-color 0.15s; -webkit-appearance: none; text-align: center;
}
.ex-inp:focus { border-color: var(--text); }
.ex-inp.both-filled { border-color: #86efac; background: #f0fdf4; }
.ex-note {
  display: none; margin-top: 8px; font-size: 11px; color: var(--muted);
  font-style: italic; line-height: 1.4;
}
.ex-card.has-note .ex-note { display: block; }
.ex-logged-summary {
  display: none; margin-top: 8px; font-size: 13px; font-weight: 600; color: var(--green);
}
.ex-card.logged .ex-logged-summary { display: block; }

/* ══ TIMER OVERLAY ══ */
#timer-overlay {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  flex-direction: column; align-items: center; justify-content: center; padding: 24px;
}
#timer-overlay.visible { display: flex; }
.timer-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 24px;
}
.timer-ring-wrap { position: relative; width: 220px; height: 220px; margin-bottom: 16px; }
.timer-ring-wrap svg { width: 220px; height: 220px; }
.timer-ring-bg  { fill: none; stroke: var(--border); stroke-width: 10; }
.timer-ring-arc {
  fill: none; stroke: var(--text); stroke-width: 10; stroke-linecap: round;
  stroke-dasharray: 628.3; stroke-dashoffset: 0;
  transform: rotate(-90deg); transform-origin: 50% 50%;
  transition: stroke-dashoffset 1s linear, stroke 0.5s;
}
.timer-num {
  position: absolute; inset: 0; display: flex;
  flex-direction: column; align-items: center; justify-content: center;
}
.timer-dig { font-family: var(--fd); font-size: 68px; color: var(--text); line-height: 1; }
.timer-set-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--muted); margin-top: 4px;
}
.timer-done-msg {
  font-family: var(--fd); font-size: 22px; color: var(--green);
  margin-bottom: 8px; opacity: 0; transition: opacity 0.3s;
}
.timer-done-msg.show { opacity: 1; }
.timer-presets { display: flex; gap: 6px; margin-bottom: 16px; }
.t-preset {
  padding: 8px 14px; background: var(--surface); border: 1.5px solid var(--border2);
  border-radius: 8px; font-family: var(--fb); font-size: 13px; font-weight: 500;
  color: var(--muted); cursor: pointer; transition: all 0.15s;
}
.t-preset.active { border-color: var(--text); color: var(--text); background: var(--bg); }
.timer-close-btn {
  font-family: var(--fb); font-size: 14px; font-weight: 500; color: var(--muted);
  background: none; border: 1.5px solid var(--border2); border-radius: var(--r);
  padding: 11px 28px; cursor: pointer; transition: color 0.15s, border-color 0.15s; margin-top: 4px;
}
.timer-close-btn:hover { color: var(--text); border-color: var(--text); }

/* ══ CALENDAR ══ */
.streak-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: #fef9c3; border: 1px solid #fde047;
  border-radius: 20px; padding: 5px 14px; font-size: 13px;
  font-weight: 600; color: #854d0e; margin-bottom: 12px;
}
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-nav-btn {
  background: none; border: 1px solid var(--border2); border-radius: 7px;
  padding: 5px 12px; color: var(--muted); font-size: 16px; cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.cal-nav-btn:hover { color: var(--text); border-color: var(--text); }
.cal-month-title { font-family: var(--fd); font-size: 18px; color: var(--text); }
.cal-dow { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; margin-bottom: 4px; }
.cal-dow div {
  text-align: center; font-size: 9px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); padding: 3px 0;
}
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-cell {
  aspect-ratio: 1; border-radius: 7px; display: flex;
  align-items: center; justify-content: center;
  font-size: 12px; font-weight: 500; cursor: pointer;
  color: var(--muted); background: var(--surface2); border: 1.5px solid transparent;
  transition: all 0.12s;
}
.cal-cell:hover { border-color: var(--border2); color: var(--text); }
.cal-cell.gym   { background: #dcfce7; border-color: #86efac; color: var(--green); }
.cal-cell.today { border-color: var(--text) !important; font-weight: 700; color: var(--text); }
.mark-today-btn {
  display: block; width: 100%; padding: 13px; background: var(--text); color: #fff;
  font-family: var(--fb); font-size: 14px; font-weight: 600; border: none;
  border-radius: var(--r); cursor: pointer; margin-top: 10px; transition: opacity 0.15s;
}
.mark-today-btn:hover { opacity: 0.85; }

/* ══ PROGRESS ══ */
.prog-select {
  width: 100%; background: var(--surface2); border: 1.5px solid var(--border2);
  border-radius: var(--r); padding: 11px 14px; font-family: var(--fb);
  font-size: 14px; color: var(--text); outline: none; cursor: pointer;
  margin-bottom: 12px; -webkit-appearance: none;
}
.chart-wrap { position: relative; width: 100%; height: 200px; }
.log-lift-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; margin-top: 8px; }
.lift-inp {
  flex: 1; min-width: 70px; background: var(--surface2); border: 1.5px solid var(--border2);
  border-radius: 8px; padding: 10px 12px; font-size: 15px; color: var(--text);
  font-family: var(--fb); outline: none; -webkit-appearance: none;
}
.lift-inp:focus { border-color: var(--text); }
.lift-inp::placeholder { color: var(--muted); font-size: 13px; }
.lift-save-btn {
  padding: 10px 20px; background: var(--text); color: #fff;
  font-family: var(--fb); font-size: 14px; font-weight: 600;
  border: none; border-radius: 8px; cursor: pointer;
}
.lift-confirm { font-size: 12px; color: var(--green); margin-top: 8px; min-height: 18px; font-weight: 500; }

/* ══ PROFILE ══ */
.prof-avatar {
  width: 68px; height: 68px; border-radius: 50%; background: var(--text);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--fd); font-size: 30px; color: #fff; margin: 0 auto 12px;
}
.prof-name { font-family: var(--fd); font-size: 22px; color: var(--text); text-align: center; margin-bottom: 4px; }
.prof-bmi  { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 16px; }
.profile-field { margin-bottom: 14px; }
.profile-field label {
  display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
}
.profile-field input, .profile-field select {
  width: 100%; background: var(--surface2); border: 1.5px solid var(--border2);
  border-radius: 8px; padding: 11px 14px; font-size: 15px; font-family: var(--fb);
  color: var(--text); outline: none; -webkit-appearance: none; transition: border-color 0.15s;
}
.profile-field input:focus, .profile-field select:focus { border-color: var(--text); }
.save-profile-btn {
  width: 100%; padding: 13px; background: var(--text); color: #fff;
  font-family: var(--fb); font-size: 15px; font-weight: 600;
  border: none; border-radius: var(--r); cursor: pointer; margin-top: 4px; transition: opacity 0.15s;
}
.save-profile-btn:hover { opacity: 0.85; }
.prof-saved { font-size: 12px; color: var(--green); text-align: center; margin-top: 8px; min-height: 18px; font-weight: 500; }
.danger-btn {
  width: 100%; padding: 12px; background: none; border: 1.5px solid #fecaca;
  border-radius: var(--r); color: var(--red); font-family: var(--fb);
  font-size: 14px; cursor: pointer; margin-top: 8px; transition: background 0.15s;
}
.danger-btn:hover { background: #fef2f2; }

@media (max-width: 360px) {
  .metric-val { font-size: 28px; }
  .timer-dig  { font-size: 56px; }
}
</style>
</head>

// ── WORKOUT PLAN ──
const PLAN = {
  "Day 1 — Chest + Shoulders + Traps": { exercises: [
    {name:"Incline Dumbbell Press",        sets:"4", reps:"8-12",    note:"45° bench, elbows slightly in, deep stretch"},
    {name:"Flat Barbell Bench Press",      sets:"4", reps:"6-10",    note:"Feet tight, bar to mid-chest, no bouncing"},
    {name:"Cable Fly (High to Low)",       sets:"3", reps:"12-15",   note:"Arms slightly bent, squeeze centre"},
    {name:"Weighted Chest Dips",           sets:"3", reps:"8-12",    note:"Lean forward slightly, slow negative"},
    {name:"Seated Barbell Shoulder Press", sets:"4", reps:"8-12",    note:"Bar slightly in front, elbows under bar"},
    {name:"Dumbbell Lateral Raises",       sets:"4", reps:"12-15",   note:"Raise till shoulder height only"},
    {name:"Rear Delt / Reverse Pec Deck",  sets:"3", reps:"12-15",   note:"Focus on elbows moving out"},
    {name:"Cable Face Pull",               sets:"3", reps:"15",      note:"Pull to forehead, elbows high"},
    {name:"Dumbbell Shrugs",               sets:"4", reps:"12-15",   note:"Shoulders straight up, no rolling"},
    {name:"Barbell Upright Row",           sets:"3", reps:"10-12",   note:"Elbows lead movement, slow tempo"},
  ]},
  "Day 2 — Back + Forearms": { exercises: [
    {name:"Lat Pulldown (Wide Grip)",      sets:"4", reps:"10-12",     note:"Chest up, pull to upper chest"},
    {name:"Chest Supported Row",           sets:"4", reps:"10-12",     note:"Elbows drive back, chest glued to pad"},
    {name:"One-Arm Dumbbell Row",          sets:"3", reps:"10-12 ea.", note:"Stretch fully at bottom"},
    {name:"Cable Straight-Arm Pulldown",   sets:"3", reps:"12-15",     note:"Arms straight, pull with lats"},
    {name:"Back Extensions",               sets:"2", reps:"15",        note:"Hinge at hips, neutral spine"},
    {name:"Wrist Curls",                   sets:"3", reps:"15-20",     note:""},
    {name:"Reverse Wrist Curls",           sets:"3", reps:"15-20",     note:""},
    {name:"Farmer Hold",                   sets:"2", reps:"30-40s",    note:"Heavy"},
  ]},
  "Day 3 — Biceps + Triceps": { exercises: [
    {name:"Barbell Curl",                  sets:"4", reps:"8-12",    note:"Elbows glued to torso, no swing"},
    {name:"Incline Dumbbell Curl",         sets:"3", reps:"10-12",   note:"Arms hang fully stretched"},
    {name:"Cable Rope Curl",               sets:"3", reps:"12-15",   note:"Spread rope at top"},
    {name:"Hammer Curls",                  sets:"3", reps:"10-12",   note:"Wrist neutral, control negative"},
    {name:"Close Grip Bench Press",        sets:"4", reps:"8-10",    note:"Shoulder-width grip, elbows tucked"},
    {name:"Rope Pushdown",                 sets:"3", reps:"12-15",   note:"Push rope apart at bottom"},
    {name:"Overhead Dumbbell Extension",   sets:"3", reps:"10-12",   note:"Elbows tight, deep stretch"},
    {name:"Dips",                          sets:"3", reps:"10-12",   note:"Slow negative, full lockout"},
  ]},
  "Day 4 — Legs + Calves": { exercises: [
    {name:"Back Squat",                    sets:"4", reps:"8-12",     note:"Heels down, hips back, chest up"},
    {name:"Leg Press",                     sets:"4", reps:"10-12",    note:"Feet mid-platform, push through heels"},
    {name:"Walking Lunges",                sets:"3", reps:"20 steps", note:"Long stride, upright torso"},
    {name:"Leg Extension",                 sets:"3", reps:"12-15",    note:"Pause 1 sec at top"},
    {name:"Seated/Lying Hamstring Curl",   sets:"4", reps:"12-15",    note:"Slow negative, squeeze hard"},
    {name:"Romanian Dumbbell Deadlift",    sets:"3", reps:"10-12",    note:"Soft knees, hinge back, full stretch"},
    {name:"Standing Calf Raise",           sets:"4", reps:"12-15",    note:"Full stretch, full squeeze"},
    {name:"Seated Calf Raise",             sets:"3", reps:"15-20",    note:"Slow reps, no bouncing"},
  ]},
};

let user = null, gymDays = [], lifts = {};
let calMonth = new Date().getMonth(), calYear = new Date().getFullYear();
let strengthChart = null;
let timerDuration = 35, timerRemaining = 35, timerRunning = false, timerInterval = null;

function save() {
  localStorage.setItem('gl_user', JSON.stringify(user));
  localStorage.setItem('gl_gymdays', JSON.stringify(gymDays));
  localStorage.setItem('gl_lifts', JSON.stringify(lifts));
}
function load() {
  try { user = JSON.parse(localStorage.getItem('gl_user')); } catch(e){}
  try { gymDays = JSON.parse(localStorage.getItem('gl_gymdays')) || []; } catch(e){}
  try { lifts = JSON.parse(localStorage.getItem('gl_lifts')) || {}; } catch(e){}
}

load();
if (user && user.name) { showApp(); }
else { document.getElementById('screen-login').classList.add('active'); }
document.getElementById('login-name').addEventListener('keydown', e => { if (e.key==='Enter') handleLogin(); });

function handleLogin() {
  const name = document.getElementById('login-name').value.trim();
  if (!name) { const el=document.getElementById('login-name'); el.classList.add('shake'); setTimeout(()=>el.classList.remove('shake'),400); return; }
  if (!user || user.name !== name) { user = {name, height:null, weight:null, goal:'build_muscle'}; save(); }
  showApp();
}
function handleLogout() {
  user=null; save();
  document.getElementById('screen-app').classList.remove('active');
  document.getElementById('screen-login').classList.add('active');
  document.getElementById('login-name').value='';
}
function showApp() {
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');
  document.getElementById('user-greeting').textContent = user.name.split(' ')[0];
  document.getElementById('prof-avatar').textContent = user.name.charAt(0).toUpperCase();
  showPanel('dashboard');
}
function showPanel(id) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  const nb = document.querySelector(`.nav-btn[data-panel="${id}"]`);
  if (nb) nb.classList.add('active');
  if (id==='dashboard') renderDashboard();
  if (id==='workout') renderDaySelector();
  if (id==='calendar') renderCalendar();
  if (id==='progress') renderProgress();
  if (id==='profile') renderProfile();
}
function getWeekDays() {
  const d=new Date(), day=d.getDay(), mon=new Date(d);
  mon.setDate(d.getDate()-day+(day===0?-6:1));
  return Array.from({length:7},(_,i)=>{ const x=new Date(mon); x.setDate(mon.getDate()+i); return x.toDateString(); });
}
function calcStreak() {
  let s=0, d=new Date();
  for(let i=0;i<365;i++) { if(gymDays.includes(d.toDateString())){s++;d.setDate(d.getDate()-1);} else break; }
  return s;
}
function renderDashboard() {
  const week=getWeekDays();
  document.getElementById('db-sessions').textContent = gymDays.filter(d=>week.includes(d)).length;
  document.getElementById('db-streak').textContent = calcStreak();
  const bmi=(user.weight&&user.height)?(user.weight/((user.height/100)**2)).toFixed(1):'—';
  document.getElementById('db-bmi').textContent = bmi;
  const strip=document.getElementById('week-strip'); strip.innerHTML='';
  ['M','T','W','T','F','S','S'].forEach((lbl,i)=>{
    const pip=document.createElement('div');
    pip.className='day-pip'+(gymDays.includes(week[i])?' done':'');
    pip.innerHTML=`<div class="dot"></div><span>${lbl}</span>`;
    strip.appendChild(pip);
  });
  const map=[3,0,1,2,3,3,0];
  document.getElementById('db-today').textContent = Object.keys(PLAN)[map[new Date().getDay()]].split('—')[1].trim();
}
function renderDaySelector() {
  document.getElementById('ex-view').style.display='none';
  const sel=document.getElementById('day-selector'); sel.style.display='block';
  sel.innerHTML='<div class="slabel">Choose your day</div>';
  Object.keys(PLAN).forEach(day=>{
    const btn=document.createElement('button'); btn.className='day-btn';
    const parts=day.split('—');
    btn.innerHTML=`<div><div class="day-btn-name">${parts[0].trim()}</div><div class="day-btn-sub">${parts[1]?parts[1].trim():''}</div></div><div class="day-btn-count">${PLAN[day].exercises.length} exercises →</div>`;
    btn.onclick=()=>showExercises(day); sel.appendChild(btn);
  });
}
function showExercises(day) {
  document.getElementById('day-selector').style.display='none';
  const view=document.getElementById('ex-view'); view.style.display='block'; view.innerHTML='';
  const back=document.createElement('button'); back.className='back-btn'; back.innerHTML='← Back'; back.onclick=renderDaySelector; view.appendChild(back);
  const hdr=document.createElement('div'); hdr.className='ex-day-header'; hdr.textContent=day.split('—')[1].trim(); view.appendChild(hdr);
  PLAN[day].exercises.forEach((ex,i)=>{
    const card=document.createElement('div');
    card.className='ex-card'+(ex.note?' has-note':''); card.id=`ex-card-${i}`;
    card.innerHTML=`<div class="ex-top"><div><div class="ex-name">${ex.name}</div><div class="ex-meta">${ex.sets} sets × ${ex.reps}</div></div><div class="ex-done-badge">✓ Done</div></div><div class="ex-inputs"><div class="ex-inp-wrap"><span class="ex-inp-lbl">Weight</span><input class="ex-inp" id="kg-${i}" type="number" min="0" placeholder="0"></div><div class="ex-inp-wrap"><span class="ex-inp-lbl">Reps</span><input class="ex-inp" id="reps-${i}" type="number" min="0" placeholder="0"></div></div><div class="ex-logged-summary" id="summary-${i}"></div><div class="ex-note">${ex.note}</div>`;
    view.appendChild(card);
    const kgInp=card.querySelector(`#kg-${i}`), repsInp=card.querySelector(`#reps-${i}`);
    function checkAndLog() {
      const kg=kgInp.value.trim(), reps=repsInp.value.trim();
      if (kg&&reps) {
        kgInp.classList.add('both-filled'); repsInp.classList.add('both-filled');
        saveLift(ex.name,parseFloat(kg),parseInt(reps));
        card.classList.add('logged');
        document.getElementById(`summary-${i}`).textContent=`${kg} kg × ${reps} reps`;
        launchTimer();
      }
    }
    kgInp.addEventListener('change',checkAndLog); repsInp.addEventListener('change',checkAndLog);
    kgInp.addEventListener('blur',checkAndLog); repsInp.addEventListener('blur',checkAndLog);
  });
}
function saveLift(exercise,kg,reps) {
  if (!lifts[exercise]) lifts[exercise]=[];
  lifts[exercise].push({kg,reps,date:new Date().toISOString()}); save();
}
function launchTimer() {
  clearInterval(timerInterval); timerRunning=false; timerRemaining=timerDuration;
  document.getElementById('timer-done-msg').classList.remove('show');
  document.getElementById('timer-set-label').textContent='REST';
  updateTimerDisplay();
  document.getElementById('timer-overlay').classList.add('visible');
  startTimerClock();
}
function startTimerClock() {
  if(timerRunning) return; timerRunning=true;
  timerInterval=setInterval(()=>{
    timerRemaining--; updateTimerDisplay();
    if(timerRemaining<=0) {
      clearInterval(timerInterval); timerRunning=false;
      document.getElementById('timer-done-msg').classList.add('show');
      document.getElementById('timer-set-label').textContent='GO!';
      playBeep();
    }
  },1000);
}
function updateTimerDisplay() {
  const m=Math.floor(timerRemaining/60), s=timerRemaining%60;
  document.getElementById('timer-dig').textContent=m+':'+String(s).padStart(2,'0');
  const pct=timerRemaining/timerDuration, circ=2*Math.PI*100;
  document.getElementById('timer-arc').style.strokeDashoffset=circ*(1-pct);
  document.getElementById('timer-arc').style.stroke=pct>0.5?'var(--text)':pct>0.2?'var(--amber)':'var(--red)';
}
function closeTimer() {
  clearInterval(timerInterval); timerRunning=false; timerRemaining=timerDuration;
  document.getElementById('timer-overlay').classList.remove('visible');
}
function setTimerPreset(s) {
  timerDuration=s; timerRemaining=s; clearInterval(timerInterval); timerRunning=false;
  document.querySelectorAll('.t-preset').forEach(b=>b.classList.toggle('active',b.dataset.s==s));
  document.getElementById('timer-done-msg').classList.remove('show');
  updateTimerDisplay(); startTimerClock();
}
function playBeep() {
  try {
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,.2,.4].forEach(t=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination); o.frequency.value=880;
      g.gain.setValueAtTime(.3,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.15);
      o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+.16);
    });
  }catch(e){}
}
function renderCalendar() {
  const d=new Date(calYear,calMonth,1);
  document.getElementById('cal-month-title').textContent=d.toLocaleDateString('en',{month:'long',year:'numeric'});
  document.getElementById('streak-badge').textContent=calcStreak()+' day streak 🔥';
  const grid=document.getElementById('cal-grid'); grid.innerHTML='';
  const dim=new Date(calYear,calMonth+1,0).getDate(), start=d.getDay();
  for(let i=0;i<start;i++) grid.appendChild(document.createElement('div'));
  const today=new Date().toDateString();
  for(let day=1;day<=dim;day++) {
    const dt=new Date(calYear,calMonth,day).toDateString();
    const cell=document.createElement('div');
    cell.className='cal-cell'+(gymDays.includes(dt)?' gym':'')+(dt===today?' today':'');
    cell.textContent=day; cell.onclick=()=>toggleGymDay(dt); grid.appendChild(cell);
  }
}
function toggleGymDay(dateStr) {
  const idx=gymDays.indexOf(dateStr);
  if(idx>=0) gymDays.splice(idx,1); else gymDays.push(dateStr);
  save(); renderCalendar();
}
function changeMonth(dir) {
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;} if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}
function markTodayGym() {
  const today=new Date().toDateString();
  if(!gymDays.includes(today)) gymDays.push(today);
  save(); renderCalendar();
}
function renderProgress() {
  const ex=document.getElementById('ex-picker').value;
  const data=(lifts[ex]||[]).map(l=>{return {x:new Date(l.date).toLocaleDateString('en',{month:'short',day:'numeric'}),y:l.kg};});
  if(strengthChart) strengthChart.destroy();
  strengthChart=new Chart(document.getElementById('strength-chart'),{
    type:'line',
    data:{labels:data.length?data.map(d=>d.x):['no data'],datasets:[{label:'kg',data:data.length?data.map(d=>d.y):[0],borderColor:'#1c1917',backgroundColor:'rgba(28,25,23,0.05)',tension:.3,pointBackgroundColor:'#1c1917',pointRadius:4,fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:false,grid:{color:'rgba(0,0,0,0.05)'},ticks:{color:'#8c8680',font:{size:11}}},x:{grid:{display:false},ticks:{color:'#8c8680',font:{size:11},maxRotation:30}}}}
  });
}
function logLift() {
  const ex=document.getElementById('log-ex').value;
  const kg=parseFloat(document.getElementById('log-kg').value);
  const reps=parseInt(document.getElementById('log-reps').value);
  if(!kg||!reps) return;
  saveLift(ex,kg,reps);
  document.getElementById('lift-confirm').textContent=`Saved: ${ex} · ${kg}kg × ${reps} reps`;
  document.getElementById('log-kg').value=''; document.getElementById('log-reps').value='';
  setTimeout(()=>document.getElementById('lift-confirm').textContent='',3000);
  renderProgress();
}
function renderProfile() {
  document.getElementById('prof-name').textContent=user.name;
  document.getElementById('prof-avatar').textContent=user.name.charAt(0).toUpperCase();
  document.getElementById('prof-height').value=user.height||'';
  document.getElementById('prof-weight').value=user.weight||'';
  document.getElementById('prof-goal').value=user.goal||'build_muscle';
  const bmi=(user.weight&&user.height)?'BMI: '+(user.weight/((user.height/100)**2)).toFixed(1):'BMI: —';
  document.getElementById('prof-bmi-disp').textContent=bmi;
}
function saveProfileData() {
  user.height=parseFloat(document.getElementById('prof-height').value)||user.height;
  user.weight=parseFloat(document.getElementById('prof-weight').value)||user.weight;
  user.goal=document.getElementById('prof-goal').value;
  save();
  document.getElementById('prof-saved').textContent='Saved ✓';
  setTimeout(()=>document.getElementById('prof-saved').textContent='',2000);
  renderProfile();
}
</script>
</body>
</html>
