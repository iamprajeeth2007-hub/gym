<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GymLog</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, doc, setDoc, getDoc,
  collection, addDoc, getDocs, deleteDoc, query, where, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── FIREBASE CONFIG ──────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyDmEwB2IQmESIhcogZkO5D1JTtycZnhN-g",
  authDomain:        "workout-77002.firebaseapp.com",
  projectId:         "workout-77002",
  storageBucket:     "workout-77002.firebasestorage.app",
  messagingSenderId: "349722944559",
  appId:             "1:349722944559:web:9074aec09adbd579a752da"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── WORKOUT PLAN ─────────────────────────────────────────
const PLAN = {
  "Day 1 — Chest + Shoulders + Traps": { exercises: [
    {name:"Incline Dumbbell Press",        sets:"4", reps:"8–12",    note:"45° bench, elbows slightly in, deep stretch"},
    {name:"Flat Barbell Bench Press",      sets:"4", reps:"6–10",    note:"Feet tight, bar to mid-chest, no bouncing"},
    {name:"Cable Fly (High → Low)",        sets:"3", reps:"12–15",   note:"Arms slightly bent, squeeze centre"},
    {name:"Weighted Chest Dips",           sets:"3", reps:"8–12",    note:"Lean forward slightly, slow negative"},
    {name:"Seated Barbell Shoulder Press", sets:"4", reps:"8–12",    note:"Bar slightly in front, elbows under bar"},
    {name:"Dumbbell Lateral Raises",       sets:"4", reps:"12–15",   note:"Raise till shoulder height only"},
    {name:"Rear Delt / Reverse Pec Deck",  sets:"3", reps:"12–15",   note:"Focus on elbows moving out"},
    {name:"Cable Face Pull",               sets:"3", reps:"15",      note:"Pull to forehead, elbows high"},
    {name:"Dumbbell Shrugs",               sets:"4", reps:"12–15",   note:"Shoulders straight up, no rolling"},
    {name:"Barbell Upright Row",           sets:"3", reps:"10–12",   note:"Elbows lead movement, slow tempo"},
  ]},
  "Day 2 — Back + Forearms": { exercises: [
    {name:"Lat Pulldown (Wide Grip)",      sets:"4", reps:"10–12",     note:"Chest up, pull to upper chest"},
    {name:"Chest Supported Row",           sets:"4", reps:"10–12",     note:"Elbows drive back, chest glued to pad"},
    {name:"One-Arm Dumbbell Row",          sets:"3", reps:"10–12 ea.", note:"Stretch fully at bottom"},
    {name:"Cable Straight-Arm Pulldown",   sets:"3", reps:"12–15",     note:"Arms straight, pull with lats"},
    {name:"Back Extensions",               sets:"2", reps:"15",        note:"Hinge at hips, neutral spine"},
    {name:"Wrist Curls",                   sets:"3", reps:"15–20",     note:""},
    {name:"Reverse Wrist Curls",           sets:"3", reps:"15–20",     note:""},
    {name:"Farmer's Hold",                 sets:"2", reps:"30–40s",    note:"Heavy"},
  ]},
  "Day 3 — Biceps + Triceps": { exercises: [
    {name:"Barbell Curl",                  sets:"4", reps:"8–12",    note:"Elbows glued to torso, no swing"},
    {name:"Incline Dumbbell Curl",         sets:"3", reps:"10–12",   note:"Arms hang fully stretched"},
    {name:"Cable Rope Curl",               sets:"3", reps:"12–15",   note:"Spread rope at top"},
    {name:"Hammer Curls",                  sets:"3", reps:"10–12",   note:"Wrist neutral, control negative"},
    {name:"Close Grip Bench Press",        sets:"4", reps:"8–10",    note:"Shoulder-width grip, elbows tucked"},
    {name:"Rope Pushdown",                 sets:"3", reps:"12–15",   note:"Push rope apart at bottom"},
    {name:"Overhead Dumbbell Extension",   sets:"3", reps:"10–12",   note:"Elbows tight, deep stretch"},
    {name:"Dips",                          sets:"3", reps:"10–12",   note:"Slow negative, full lockout"},
  ]},
  "Day 4 — Legs + Calves": { exercises: [
    {name:"Back Squat",                    sets:"4", reps:"8–12",     note:"Heels down, hips back, chest up"},
    {name:"Leg Press",                     sets:"4", reps:"10–12",    note:"Feet mid-platform, push through heels"},
    {name:"Walking Lunges",                sets:"3", reps:"20 steps", note:"Long stride, upright torso"},
    {name:"Leg Extension",                 sets:"3", reps:"12–15",    note:"Pause 1 sec at top"},
    {name:"Seated/Lying Hamstring Curl",   sets:"4", reps:"12–15",    note:"Slow negative, squeeze hard"},
    {name:"Romanian Dumbbell Deadlift",    sets:"3", reps:"10–12",    note:"Soft knees, hinge back, full stretch"},
    {name:"Standing Calf Raise",           sets:"4", reps:"12–15",    note:"Full stretch, full squeeze"},
    {name:"Seated Calf Raise",             sets:"3", reps:"15–20",    note:"Slow reps, no bouncing"},
  ]},
};

// ── STATE ────────────────────────────────────────────────
let user       = null;   // { uid, name, height, weight, goal }
let calMonth   = new Date().getMonth();
let calYear    = new Date().getFullYear();
let strengthChart = null;
let timerDuration  = 60;
let timerRemaining = 60;
let timerRunning   = false;
let timerInterval  = null;

// ── FIREBASE HELPERS ─────────────────────────────────────
async function fbSaveProfile(uid, data) {
  await setDoc(doc(db,"users",uid), data, {merge:true});
}
async function fbLoadProfile(uid) {
  const s = await getDoc(doc(db,"users",uid));
  return s.exists() ? s.data() : null;
}
async function fbSaveGymDay(uid, dateStr) {
  await setDoc(doc(db,"users",uid,"gymdays",dateStr), {date:dateStr, logged:true});
}
async function fbRemoveGymDay(uid, dateStr) {
  await deleteDoc(doc(db,"users",uid,"gymdays",dateStr));
}
async function fbLoadGymDays(uid) {
  const s = await getDocs(collection(db,"users",uid,"gymdays"));
  return s.docs.map(d=>d.id);
}
async function fbSaveLift(uid, exercise, kg, reps) {
  await addDoc(collection(db,"users",uid,"lifts"), {
    exercise, kg:parseFloat(kg), reps:parseInt(reps),
    date: new Date().toISOString()
  });
}
async function fbLoadLifts(uid, exercise) {
  const q = query(
    collection(db,"users",uid,"lifts"),
    where("exercise","==",exercise),
    orderBy("date","asc")
  );
  const s = await getDocs(q);
  return s.docs.map(d=>d.data());
}

// ── ROUTING ──────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
  updateTimerDisplay();
  const stored = localStorage.getItem("gl_uid");
  if (stored) {
    showLoading(true);
    fbLoadProfile(stored).then(profile => {
      showLoading(false);
      if (profile && profile.name) {
        user = {uid:stored, ...profile};
        enterApp();
      } else {
        showScreen("login");
      }
    }).catch(() => { showLoading(false); showScreen("login"); });
  } else {
    showScreen("login");
  }
});

function showLoading(on) {
  document.getElementById("loading-overlay").style.display = on ? "flex" : "none";
}

// ── LOGIN ────────────────────────────────────────────────
window.handleLogin = async function() {
  const name = document.getElementById("inp-name").value.trim();
  if (!name) { shake("inp-name"); return; }

  const uid = "u_" + btoa(encodeURIComponent(name.toLowerCase())).replace(/[^a-z0-9]/gi,"").slice(0,20);
  localStorage.setItem("gl_uid", uid);
  showLoading(true);

  try {
    const existing = await fbLoadProfile(uid);
    if (existing && existing.name) {
      user = {uid, ...existing};
    } else {
      user = {uid, name, height:null, weight:null, goal:"build_muscle"};
      await fbSaveProfile(uid, {name, height:null, weight:null, goal:"build_muscle"});
    }
    showLoading(false);
    enterApp();
  } catch(e) {
    showLoading(false);
    alert("Connection error. Check your internet and try again.");
  }
};

window.handleLogout = function() {
  localStorage.removeItem("gl_uid");
  user = null;
  showScreen("login");
  document.getElementById("inp-name").value = "";
};

function enterApp() {
  document.getElementById("greeting-name").textContent = user.name.split(" ")[0];
  document.getElementById("avatar-letter").textContent = user.name.charAt(0).toUpperCase();
  showScreen("app");
  showPanel("dashboard");
}

// ── SCREENS ──────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen-"+id).classList.add("active");
}

// ── PANELS ───────────────────────────────────────────────
window.showPanel = function(id) {
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("panel-"+id).classList.add("active");
  const nb = document.querySelector(`.nav-btn[data-p="${id}"]`);
  if (nb) nb.classList.add("active");
  if (id==="dashboard") renderDashboard();
  if (id==="workout")   renderDaySelector();
  if (id==="calendar")  renderCalendar();
  if (id==="progress")  renderProgress();
  if (id==="profile")   renderProfile();
};

// ── DASHBOARD ────────────────────────────────────────────
async function renderDashboard() {
  const gymDays = await fbLoadGymDays(user.uid);
  const week    = getWeekDays();
  document.getElementById("db-week").textContent  = gymDays.filter(d=>week.includes(d)).length;
  document.getElementById("db-streak").textContent = calcStreak(gymDays);
  const bmi = (user.weight&&user.height)
    ? (user.weight/((user.height/100)**2)).toFixed(1) : "—";
  document.getElementById("db-bmi").textContent = bmi;

  // week strip
  const strip = document.getElementById("week-strip");
  strip.innerHTML = "";
  ["M","T","W","T","F","S","S"].forEach((lbl,i) => {
    const d = week[i];
    const pip = document.createElement("div");
    pip.className = "day-pip" + (gymDays.includes(d)?" done":"") + (d===new Date().toDateString()?" today":"");
    pip.innerHTML = `<div class="pip-dot"></div><span>${lbl}</span>`;
    strip.appendChild(pip);
  });

  // today's workout suggestion
  const map = [3,0,1,2,3,3,0];
  const dayKey = Object.keys(PLAN)[map[new Date().getDay()]];
  document.getElementById("db-today-name").textContent = dayKey.split("—")[1].trim();
}

// ── WORKOUT ──────────────────────────────────────────────
window.renderDaySelector = function() {
  document.getElementById("day-sel").style.display  = "block";
  document.getElementById("ex-view").style.display  = "none";
  const el = document.getElementById("day-sel");
  el.innerHTML = `<p class="section-lbl">Choose your day</p>`;
  Object.keys(PLAN).forEach(day => {
    const btn = document.createElement("button");
    btn.className = "day-row";
    const [label, sub] = day.split("—");
    btn.innerHTML = `
      <div>
        <div class="day-row-title">${label.trim()}</div>
        <div class="day-row-sub">${sub?sub.trim():""}</div>
      </div>
      <div class="day-row-count">${PLAN[day].exercises.length} exercises</div>`;
    btn.onclick = () => showExercises(day);
    el.appendChild(btn);
  });
};

function showExercises(day) {
  document.getElementById("day-sel").style.display = "none";
  const view = document.getElementById("ex-view");
  view.style.display = "block";
  view.innerHTML = `
    <button class="back-link" onclick="renderDaySelector()">← Back</button>
    <h2 class="ex-day-title">${day.split("—")[1]?day.split("—")[1].trim():day}</h2>`;

  PLAN[day].exercises.forEach((ex, i) => {
    const card = document.createElement("div");
    card.className = "ex-card";
    card.id = `exc-${i}`;
    card.innerHTML = `
      <div class="ex-card-top">
        <div>
          <div class="ex-card-name">${ex.name}</div>
          <div class="ex-card-meta">${ex.sets} sets · ${ex.reps}</div>
          ${ex.note ? `<div class="ex-card-note">${ex.note}</div>` : ""}
        </div>
        <div class="ex-logged-pill" id="pill-${i}">✓ done</div>
      </div>
      <div class="ex-inputs" id="inp-wrap-${i}">
        <div class="inp-group">
          <label>Weight (kg)</label>
          <input class="ex-inp" id="kg-${i}" type="number" min="0" placeholder="0">
        </div>
        <div class="inp-group">
          <label>Reps</label>
          <input class="ex-inp" id="rp-${i}" type="number" min="0" placeholder="0">
        </div>
      </div>
      <div class="ex-summary" id="summ-${i}"></div>`;
    view.appendChild(card);

    const kgEl = card.querySelector(`#kg-${i}`);
    const rpEl = card.querySelector(`#rp-${i}`);

    function tryLog() {
      const kg = kgEl.value.trim();
      const rp = rpEl.value.trim();
      if (kg && rp && parseFloat(kg)>0 && parseInt(rp)>0) {
        fbSaveLift(user.uid, ex.name, kg, rp);
        card.classList.add("logged");
        document.getElementById(`summ-${i}`).textContent = `${kg} kg × ${rp} reps`;
        launchTimer();
      }
    }

    kgEl.addEventListener("blur", tryLog);
    rpEl.addEventListener("blur", tryLog);
    kgEl.addEventListener("keydown", e => { if(e.key==="Enter") rpEl.focus(); });
    rpEl.addEventListener("keydown", e => { if(e.key==="Enter") { rpEl.blur(); tryLog(); }});
  });
}

// ── TIMER OVERLAY ────────────────────────────────────────
function launchTimer() {
  clearInterval(timerInterval);
  timerRunning   = false;
  timerRemaining = timerDuration;
  document.getElementById("timer-done-txt").style.display = "none";
  updateTimerDisplay();
  document.getElementById("timer-overlay").classList.add("open");
  startTimerClock();
}
function startTimerClock() {
  if (timerRunning) return;
  timerRunning = true;
  timerInterval = setInterval(()=>{
    timerRemaining--;
    updateTimerDisplay();
    if (timerRemaining<=0) {
      clearInterval(timerInterval); timerRunning=false;
      document.getElementById("timer-done-txt").style.display = "block";
      playBeep();
    }
  },1000);
}
function updateTimerDisplay() {
  const m = Math.floor(timerRemaining/60);
  const s = timerRemaining%60;
  document.getElementById("timer-digits").textContent = m+":"+String(s).padStart(2,"0");
  const pct = timerRemaining / timerDuration;
  const c = 2*Math.PI*88;
  const arc = document.getElementById("t-arc");
  arc.style.strokeDashoffset = c*(1-pct);
  arc.style.stroke = pct>0.5?"#1a1a1a":pct>0.25?"#f59e0b":"#ef4444";
}
window.closeTimer = function() {
  clearInterval(timerInterval); timerRunning=false;
  timerRemaining=timerDuration;
  document.getElementById("timer-overlay").classList.remove("open");
};
window.setPreset = function(s) {
  timerDuration=s; timerRemaining=s;
  clearInterval(timerInterval); timerRunning=false;
  document.querySelectorAll(".preset-btn").forEach(b=>b.classList.toggle("active",b.dataset.s==s));
  document.getElementById("timer-done-txt").style.display="none";
  updateTimerDisplay();
  startTimerClock();
};
function playBeep() {
  try {
    const ctx = new(window.AudioContext||window.webkitAudioContext)();
    [0,.2,.4].forEach(t=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=880;
      g.gain.setValueAtTime(.25,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.15);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.16);
    });
  }catch(e){}
}

// ── CALENDAR ─────────────────────────────────────────────
async function renderCalendar() {
  const gymDays = await fbLoadGymDays(user.uid);
  const d = new Date(calYear, calMonth, 1);
  document.getElementById("cal-title").textContent =
    d.toLocaleDateString("en",{month:"long",year:"numeric"});
  document.getElementById("streak-lbl").textContent = calcStreak(gymDays)+" day streak 🔥";
  const grid = document.getElementById("cal-grid");
  grid.innerHTML="";
  const dim = new Date(calYear,calMonth+1,0).getDate();
  const start = d.getDay();
  for(let i=0;i<start;i++) grid.appendChild(document.createElement("div"));
  const today = new Date().toDateString();
  for(let day=1;day<=dim;day++){
    const dt = new Date(calYear,calMonth,day).toDateString();
    const cell=document.createElement("div");
    cell.className="cal-cell"+(gymDays.includes(dt)?" gym":"")+(dt===today?" today":"");
    cell.textContent=day;
    cell.onclick=()=>toggleGymDay(dt,gymDays);
    grid.appendChild(cell);
  }
}
async function toggleGymDay(dateStr, gymDays) {
  if(gymDays.includes(dateStr)) await fbRemoveGymDay(user.uid,dateStr);
  else await fbSaveGymDay(user.uid,dateStr);
  renderCalendar();
}
window.changeMonth = function(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
};
window.markToday = async function(){
  await fbSaveGymDay(user.uid, new Date().toDateString());
  renderCalendar();
};

// ── PROGRESS ─────────────────────────────────────────────
async function renderProgress() {
  const ex = document.getElementById("ex-picker").value;
  const lifts = await fbLoadLifts(user.uid, ex);
  const labels = lifts.map(l=>new Date(l.date).toLocaleDateString("en",{month:"short",day:"numeric"}));
  const data   = lifts.map(l=>l.kg);

  if(strengthChart) strengthChart.destroy();
  strengthChart = new Chart(document.getElementById("s-chart"),{
    type:"line",
    data:{
      labels: labels.length?labels:["no data yet"],
      datasets:[{
        label:"kg", data:data.length?data:[0],
        borderColor:"#1a1a1a", backgroundColor:"rgba(26,26,26,0.04)",
        tension:.3, pointBackgroundColor:"#1a1a1a", pointRadius:4, fill:true,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        y:{beginAtZero:false,grid:{color:"rgba(0,0,0,0.05)"},ticks:{color:"#9ca3af",font:{size:11}}},
        x:{grid:{display:false},ticks:{color:"#9ca3af",font:{size:11},maxRotation:30}}
      }
    }
  });
}
window.saveProgressLift = async function(){
  const ex  = document.getElementById("p-ex").value;
  const kg  = document.getElementById("p-kg").value;
  const rp  = document.getElementById("p-rp").value;
  if(!kg||!rp) return;
  await fbSaveLift(user.uid,ex,kg,rp);
  document.getElementById("p-confirm").textContent=`Saved: ${ex} · ${kg}kg × ${rp} reps`;
  document.getElementById("p-kg").value="";
  document.getElementById("p-rp").value="";
  setTimeout(()=>document.getElementById("p-confirm").textContent="",3000);
  renderProgress();
};

// ── PROFILE ──────────────────────────────────────────────
function renderProfile(){
  document.getElementById("p-name-disp").textContent = user.name;
  document.getElementById("p-avatar").textContent    = user.name.charAt(0).toUpperCase();
  document.getElementById("p-height").value  = user.height||"";
  document.getElementById("p-weight").value  = user.weight||"";
  document.getElementById("p-goal").value    = user.goal||"build_muscle";
  const bmi=(user.weight&&user.height)
    ?"BMI "+( user.weight/((user.height/100)**2)).toFixed(1):"BMI —";
  document.getElementById("p-bmi").textContent=bmi;
}
window.saveProfile = async function(){
  user.height = parseFloat(document.getElementById("p-height").value)||user.height;
  user.weight = parseFloat(document.getElementById("p-weight").value)||user.weight;
  user.goal   = document.getElementById("p-goal").value;
  await fbSaveProfile(user.uid,{name:user.name,height:user.height,weight:user.weight,goal:user.goal});
  document.getElementById("p-saved").textContent="Saved ✓";
  setTimeout(()=>document.getElementById("p-saved").textContent="",2000);
  renderProfile();
};

// ── UTILS ────────────────────────────────────────────────
function getWeekDays(){
  const d=new Date(), day=d.getDay();
  const mon=new Date(d);
  mon.setDate(d.getDate()-day+(day===0?-6:1));
  return Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x.toDateString();});
}
function calcStreak(gymDays){
  let s=0,d=new Date();
  for(let i=0;i<365;i++){
    if(gymDays.includes(d.toDateString())){s++;d.setDate(d.getDate()-1);}
    else break;
  }
  return s;
}
function shake(id){
  const el=document.getElementById(id);
  el.classList.add("shake");
  setTimeout(()=>el.classList.remove("shake"),400);
}

// keyboard shortcuts
document.addEventListener("keydown",e=>{
  if(e.target.id==="inp-name"&&e.key==="Enter") window.handleLogin();
});
</script>

<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

:root {
  --bg:       #ffffff;
  --surface:  #f8f8f7;
  --surface2: #f0eeec;
  --border:   #e8e5e2;
  --border2:  #d4d0cb;
  --text:     #1a1a1a;
  --muted:    #8a8580;
  --accent:   #1a1a1a;
  --green:    #16a34a;
  --amber:    #d97706;
  --red:      #dc2626;
  --r:        12px;
  --font-d:   'DM Serif Display', serif;
  --font-b:   'DM Sans', sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-b);
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}

/* ── LOADING OVERLAY ── */
#loading-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(255,255,255,0.9);
  z-index: 9999;
  align-items: center;
  justify-content: center;
}
.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--text);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── SCREENS ── */
.screen { display: none; }
.screen.active { display: flex; flex-direction: column; min-height: 100vh; }

/* ── LOGIN ── */
#screen-login {
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  background: var(--bg);
}

.login-card {
  width: 100%;
  max-width: 380px;
  animation: riseUp 0.5s cubic-bezier(.22,1,.36,1);
}
@keyframes riseUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}

.login-wordmark {
  font-family: var(--font-d);
  font-size: 48px;
  color: var(--text);
  letter-spacing: -0.02em;
  margin-bottom: 6px;
}
.login-sub {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 48px;
  font-weight: 300;
}

.field-lbl {
  display: block;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.login-inp {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border2);
  border-radius: var(--r);
  padding: 14px 16px;
  font-family: var(--font-b);
  font-size: 16px;
  font-weight: 400;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 16px;
}
.login-inp:focus { border-color: var(--text); }

.login-btn {
  width: 100%;
  padding: 15px;
  background: var(--text);
  color: #fff;
  font-family: var(--font-b);
  font-size: 15px;
  font-weight: 600;
  border: none;
  border-radius: var(--r);
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.01em;
}
.login-btn:hover { opacity: 0.85; }
.login-btn:active { transform: scale(0.985); }

@keyframes shake {
  0%,100% { transform:translateX(0); }
  25%,75%  { transform:translateX(-6px); }
  50%      { transform:translateX(6px); }
}
.shake { animation: shake 0.35s ease; border-color: var(--red) !important; }

/* ── APP HEADER ── */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px 12px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);

}
.header-logo { font-family: var(--font-d); font-size: 22px; color: var(--text); letter-spacing: -0.01em; }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-greeting { font-size: 13px; color: var(--muted); }
.header-greeting strong { color: var(--text); font-weight: 500; }
.signout-btn {
  font-size: 12px; color: var(--muted); background: none;
  border: 1px solid var(--border2); border-radius: 8px; padding: 5px 11px;
  cursor: pointer; font-family: var(--font-b); transition: color .15s, border-color .15s;
}
.signout-btn:hover { color: var(--red); border-color: var(--red); }

/* ── NAV ── */
.bottom-nav {
  display: flex;
  position: fixed; bottom:0; left:0; right:0;
  background: var(--bg);
  border-top: 1px solid var(--border);
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 9px 4px 7px; background: none; border: none; cursor: pointer;
  color: var(--muted); font-family: var(--font-b); font-size: 9.5px;
  font-weight: 500; letter-spacing: 0.04em; gap: 4px;
  transition: color .15s; text-transform: uppercase;
}
.nav-btn svg { width: 19px; height: 19px; }
.nav-btn.active { color: var(--text); }

/* ── PANELS ── */
.panels { flex:1; overflow-y:auto; padding: 16px 16px 86px; }
.panel { display: none; animation: fadeUp .18s ease; }
.panel.active { display: block; }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── UTILITIES ── */
.section-lbl {
  font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
}
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px; margin-bottom: 10px;
}
.divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

/* ── METRIC ROW ── */
.metric-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 10px; }
.metric {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 10px; text-align: center;
}
.metric-val { font-family: var(--font-d); font-size: 36px; color: var(--text); line-height: 1; }
.metric-lbl { font-size: 10px; color: var(--muted); margin-top: 4px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; }

/* ── WEEK STRIP ── */
.week-strip { display: flex; gap: 5px; }
.day-pip {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; padding: 8px 4px; border-radius: 8px;
  background: var(--surface2); border: 1px solid transparent;
  font-size: 9px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em;
}
.pip-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); }
.day-pip.done { background: #f0fdf4; border-color: #86efac; color: var(--green); }
.day-pip.done .pip-dot { background: var(--green); }
.day-pip.today { border-color: var(--border2); }

/* ── TODAY BANNER ── */
.today-banner {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--text); color: #fff;
  border-radius: var(--r); padding: 16px; margin-bottom: 10px;
}
.today-lbl { font-size: 10px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; opacity: .6; margin-bottom: 4px; }
.today-name { font-family: var(--font-d); font-size: 18px; }
.go-btn {
  background: #fff; color: var(--text);
  font-family: var(--font-b); font-size: 13px; font-weight: 600;
  border: none; border-radius: 8px; padding: 9px 16px; cursor: pointer;
  white-space: nowrap; transition: opacity .15s;
}
.go-btn:hover { opacity: .85; }

/* ── DAY SELECTOR ── */
.day-row {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px; margin-bottom: 8px;
  cursor: pointer; text-align: left; transition: border-color .15s, background .15s;
  font-family: var(--font-b);
}
.day-row:hover { border-color: var(--text); }
.day-row-title { font-family: var(--font-d); font-size: 17px; color: var(--text); margin-bottom: 2px; }
.day-row-sub { font-size: 12px; color: var(--muted); }
.day-row-count { font-size: 12px; color: var(--muted); }

/* ── EXERCISE CARDS ── */
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 500; color: var(--muted);
  background: none; border: 1px solid var(--border); border-radius: 8px;
  padding: 6px 12px; cursor: pointer; margin-bottom: 14px;
  font-family: var(--font-b); transition: color .15s;
}
.back-link:hover { color: var(--text); }
.ex-day-title {
  font-family: var(--font-d); font-size: 26px; color: var(--text);
  margin-bottom: 14px; letter-spacing: -0.01em;
}
.ex-card {
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: var(--r); padding: 14px; margin-bottom: 8px;
  transition: border-color .2s;
}
.ex-card.logged { border-color: #86efac; background: #f0fdf4; }
.ex-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
.ex-card-name { font-weight: 600; font-size: 14px; color: var(--text); margin-bottom: 2px; }
.ex-card-meta { font-size: 12px; color: var(--muted); }
.ex-card-note { font-size: 11px; color: var(--muted); margin-top: 4px; font-style: italic; line-height: 1.4; }
.ex-logged-pill {
  display: none;
  font-size: 11px; font-weight: 600; color: var(--green);
  background: #dcfce7; border: 1px solid #86efac;
  border-radius: 20px; padding: 3px 10px; white-space: nowrap;
}
.ex-card.logged .ex-logged-pill { display: block; }
.ex-inputs { display: flex; gap: 8px; }
.ex-card.logged .ex-inputs { opacity: 0.4; pointer-events: none; }
.inp-group { flex: 1; }
.inp-group label {
  display: block; font-size: 10px; font-weight: 600; letter-spacing: .08em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 5px;
}
.ex-inp {
  width: 100%; background: var(--surface);
  border: 1.5px solid var(--border2); border-radius: 8px;
  padding: 10px 12px; font-family: var(--font-d); font-size: 22px;
  color: var(--text); outline: none; transition: border-color .15s;
  -webkit-appearance: none; text-align: center;
}
.ex-inp:focus { border-color: var(--text); }
.ex-summary {
  margin-top: 10px; font-size: 13px; font-weight: 600; color: var(--green);
  display: none;
}
.ex-card.logged .ex-summary { display: block; }

/* ── TIMER OVERLAY ── */
#timer-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 500;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  flex-direction: column; align-items: center; justify-content: center; padding: 24px;
}
#timer-overlay.open { display: flex; }
.t-label {
  font-size: 10px; font-weight: 600; letter-spacing: .18em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 24px;
}
.t-ring-wrap { position: relative; width: 210px; height: 210px; margin-bottom: 16px; }
.t-ring-wrap svg { width: 210px; height: 210px; }
.t-ring-bg { fill: none; stroke: var(--border); stroke-width: 8; }
.t-ring-arc {
  fill: none; stroke: var(--text); stroke-width: 8;
  stroke-linecap: round; stroke-dasharray: 552.9; stroke-dashoffset: 0;
  transform: rotate(-90deg); transform-origin: 50% 50%;
  transition: stroke-dashoffset 1s linear, stroke .4s;
}
.t-num {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.t-digits { font-family: var(--font-d); font-size: 64px; color: var(--text); line-height: 1; }
.t-sub { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
.t-done-txt {
  font-family: var(--font-d); font-size: 20px; color: var(--green);
  margin-bottom: 8px; display: none;
}
.t-presets { display: flex; gap: 6px; margin-bottom: 16px; }
.preset-btn {
  padding: 8px 14px; background: var(--surface); border: 1.5px solid var(--border2);
  border-radius: 8px; font-family: var(--font-b); font-size: 13px; font-weight: 500;
  color: var(--muted); cursor: pointer; transition: all .15s;
}
.preset-btn.active { border-color: var(--text); color: var(--text); background: var(--bg); }
.t-close {
  padding: 12px 32px; background: none; border: 1.5px solid var(--border2);
  border-radius: var(--r); font-family: var(--font-b); font-size: 14px; font-weight: 500;
  color: var(--muted); cursor: pointer; transition: color .15s, border-color .15s;
}
.t-close:hover { color: var(--text); border-color: var(--text); }

/* ── CALENDAR ── */
.streak-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: #fef9c3; border: 1px solid #fde047;
  border-radius: 20px; padding: 5px 14px; font-size: 13px; font-weight: 600;
  color: #854d0e; margin-bottom: 12px;
}
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-month-name { font-family: var(--font-d); font-size: 18px; color: var(--text); }
.cal-nav-btn {
  background: none; border: 1px solid var(--border2); border-radius: 7px;
  padding: 5px 12px; color: var(--muted); font-size: 16px; cursor: pointer;
  transition: color .15s, border-color .15s;
}
.cal-nav-btn:hover { color: var(--text); border-color: var(--text); }
.cal-dow { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; margin-bottom: 4px; }
.cal-dow div { text-align: center; font-size: 9px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); padding: 3px 0; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-cell {
  aspect-ratio: 1; border-radius: 7px; display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 500; cursor: pointer; color: var(--muted);
  background: var(--surface2); border: 1.5px solid transparent; transition: all .12s;
}
.cal-cell:hover { border-color: var(--border2); color: var(--text); }
.cal-cell.gym { background: #dcfce7; border-color: #86efac; color: var(--green); }
.cal-cell.today { border-color: var(--text) !important; color: var(--text); font-weight: 700; }
.mark-btn {
  display: block; width: 100%; padding: 12px;
  background: var(--text); color: #fff;
  font-family: var(--font-b); font-size: 14px; font-weight: 600;
  border: none; border-radius: var(--r); cursor: pointer; margin-top: 10px;
  transition: opacity .15s;
}
.mark-btn:hover { opacity: .85; }

/* ── PROGRESS ── */
.prog-select {
  width: 100%; background: var(--surface); border: 1.5px solid var(--border2);
  border-radius: var(--r); padding: 11px 14px; font-family: var(--font-b); font-size: 14px;
  color: var(--text); outline: none; cursor: pointer; margin-bottom: 12px; -webkit-appearance: none;
}
.chart-wrap { position: relative; width: 100%; height: 200px; }
.log-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; margin-top: 8px; }
.log-inp {
  flex: 1; min-width: 70px; background: var(--surface);
  border: 1.5px solid var(--border2); border-radius: 8px; padding: 10px 12px;
  font-size: 15px; color: var(--text); font-family: var(--font-b); outline: none; -webkit-appearance: none;
}
.log-inp:focus { border-color: var(--text); }
.log-inp::placeholder { color: var(--muted); font-size: 13px; }
.log-save-btn {
  padding: 10px 20px; background: var(--text); color: #fff;
  font-family: var(--font-b); font-size: 14px; font-weight: 600;
  border: none; border-radius: 8px; cursor: pointer;
}
.log-confirm { font-size: 12px; color: var(--green); margin-top: 8px; min-height: 18px; font-weight: 500; }

/* ── PROFILE ── */
.p-avatar {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--text); display: flex; align-items: center; justify-content: center;
  font-family: var(--font-d); font-size: 28px; color: #fff; margin: 0 auto 10px;
}
.p-name-disp { font-family: var(--font-d); font-size: 22px; text-align: center; margin-bottom: 3px; }
.p-bmi-disp { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 18px; }
.profile-row { margin-bottom: 14px; }
.profile-row label {
  display: block; font-size: 11px; font-weight: 600; letter-spacing: .08em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
}
.profile-row input, .profile-row select {
  width: 100%; background: var(--surface); border: 1.5px solid var(--border2);
  border-radius: 8px; padding: 11px 14px; font-size: 15px; font-family: var(--font-b);
  color: var(--text); outline: none; -webkit-appearance: none; transition: border-color .15s;
}
.profile-row input:focus, .profile-row select:focus { border-color: var(--text); }
.save-profile-btn {
  width: 100%; padding: 13px; background: var(--text); color: #fff;
  font-family: var(--font-b); font-size: 15px; font-weight: 600;
  border: none; border-radius: var(--r); cursor: pointer; margin-top: 4px; transition: opacity .15s;
}
.save-profile-btn:hover { opacity: .85; }
.p-saved { font-size: 12px; color: var(--green); text-align: center; margin-top: 8px; min-height: 18px; font-weight: 500; }
.danger-btn {
  width: 100%; padding: 12px; background: none; border: 1.5px solid #fecaca;
  border-radius: var(--r); color: var(--red); font-family: var(--font-b); font-size: 14px;
  cursor: pointer; margin-top: 8px; transition: background .15s;
}
.danger-btn:hover { background: #fef2f2; }

/* ── RESPONSIVE ── */
@media (max-width: 360px) {
  .metric-val { font-size: 28px; }
  .t-digits { font-size: 52px; }
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-overlay">
  <div class="spinner"></div>
</div>

<!-- TIMER OVERLAY -->
<div id="timer-overlay">
  <div class="t-label">Rest between sets</div>
  <div class="t-ring-wrap">
    <svg viewBox="0 0 210 210">
      <circle class="t-ring-bg" cx="105" cy="105" r="88"/>
      <circle class="t-ring-arc" id="t-arc" cx="105" cy="105" r="88"/>
    </svg>
    <div class="t-num">
      <div class="t-digits" id="timer-digits">1:00</div>
      <div class="t-sub" id="t-sub-lbl">rest</div>
    </div>
  </div>
  <div class="t-done-txt" id="timer-done-txt">Time to lift! 💪</div>
  <div class="t-presets">
    <button class="preset-btn" data-s="30" onclick="setPreset(30)">30s</button>
    <button class="preset-btn" data-s="45" onclick="setPreset(45)">45s</button>
    <button class="preset-btn active" data-s="60" onclick="setPreset(60)">60s</button>
    <button class="preset-btn" data-s="90" onclick="setPreset(90)">90s</button>
    <button class="preset-btn" data-s="120" onclick="setPreset(120)">2m</button>
  </div>
  <button class="t-close" onclick="closeTimer()">Skip rest</button>
</div>

<!-- ════ LOGIN ════ -->
<div id="screen-login" class="screen active">
  <div class="login-card">
    <div class="login-wordmark">GymLog</div>
    <div class="login-sub">Your personal training companion.</div>

    <label class="field-lbl" for="inp-name">Your name</label>
    <input type="text" class="login-inp" id="inp-name" placeholder="e.g. Mohit" autocomplete="off">
    <button class="login-btn" onclick="handleLogin()">Continue →</button>
  </div>
</div>

<!-- ════ APP ════ -->
<div id="screen-app" class="screen">

  <div class="app-header">
    <div class="header-logo">GymLog</div>
    <div class="header-right">
      <div class="header-greeting">Hey, <strong id="greeting-name"></strong></div>
      <button class="signout-btn" onclick="handleLogout()">Sign out</button>
    </div>
  </div>

  <div class="panels">

    <!-- DASHBOARD -->
    <div id="panel-dashboard" class="panel">
      <div class="metric-row">
        <div class="metric">
          <div class="metric-val" id="db-week">0</div>
          <div class="metric-lbl">This week</div>
        </div>
        <div class="metric">
          <div class="metric-val" id="db-streak">0</div>
          <div class="metric-lbl">Streak</div>
        </div>
        <div class="metric">
          <div class="metric-val" id="db-bmi">—</div>
          <div class="metric-lbl">BMI</div>
        </div>
      </div>

      <div class="card">
        <p class="section-lbl">This week</p>
        <div class="week-strip" id="week-strip"></div>
      </div>

      <div class="today-banner">
        <div>
          <div class="today-lbl">Today's workout</div>
          <div class="today-name" id="db-today-name">—</div>
        </div>
        <button class="go-btn" onclick="showPanel('workout')">Start →</button>
      </div>
    </div>

    <!-- WORKOUT -->
    <div id="panel-workout" class="panel">
      <div id="day-sel"></div>
      <div id="ex-view" style="display:none;"></div>

    <!-- CALENDAR -->
    <div id="panel-calendar" class="panel">
      <div class="streak-badge" id="streak-lbl">0 day streak 🔥</div>

        <div class="cal-header">
          <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
          <div class="cal-month-name" id="cal-title"></div>
          <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
        </div>
        <div class="cal-dow">
          <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>

    <!-- PROGRESS -->
    <div id="panel-progress" class="panel">

          <option>Flat Barbell Bench Press</option>
          <option>Back Squat</option>
          <option>Barbell Curl</option>
          <option>Lat Pulldown (Wide Grip)</option>
          <option>Romanian Dumbbell Deadlift</option>
          <option>Incline Dumbbell Press</option>
          <option>Dumbbell Lateral Raises</option>
          <option>Hammer Curls</option>

          <option>Flat Barbell Bench Press</option>
          <option>Back Squat</option>
          <option>Barbell Curl</option>
          <option>Lat Pulldown (Wide Grip)</option>
          <option>Romanian Dumbbell Deadlift</option>
          <option>Incline Dumbbell Press</option>
          <option>Dumbbell Lateral Raises</option>
          <option>Hammer Curls</option>
        </select>
        <div class="log-row">
          <input class="log-inp" type="number" id="p-kg" placeholder="kg" min="0">
          <input class="log-inp" type="number" id="p-rp" placeholder="reps" min="0">
          <button class="log-save-btn" onclick="saveProgressLift()">Save</button>
        </div>
        <div class="log-confirm" id="p-confirm"></div>
      </div>
    </div>

    <!-- PROFILE -->
    <div id="panel-profile" class="panel">
      <div class="card" style="text-align:center; padding:24px 16px;">
        <div class="p-avatar" id="p-avatar">?</div>
        <div class="p-name-disp" id="p-name-disp"></div>
        <div class="p-bmi-disp" id="p-bmi"></div>
      </div>
      <div class="card">
        <p class="section-lbl">Body stats</p>
        <div class="profile-row">
          <label>Height (cm)</label>
          <input type="number" id="p-height" placeholder="175">
        </div>
        <div class="profile-row">
          <label>Weight (kg)</label>
          <input type="number" id="p-weight" placeholder="75">
        </div>
        <div class="profile-row">
